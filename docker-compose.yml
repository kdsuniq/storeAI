services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: store_ai
      POSTGRES_USER: store_ai
      POSTGRES_PASSWORD: store_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U store_ai -d store_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DEBUG: "0"
      DJANGO_SECRET_KEY: "change-me-local"
      ALLOWED_HOSTS: "*"
      DB_ENGINE: postgres
      POSTGRES_DB: store_ai
      POSTGRES_USER: store_ai
      POSTGRES_PASSWORD: store_ai
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-${OPENAI_API_KEY:-}}"
      OPENROUTER_MODEL: "${OPENROUTER_MODEL:-openrouter/free}"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
