apiVersion: v1
kind: ConfigMap
metadata:
  name: store-ai-config
  namespace: store-ai
data:
  DEBUG: "0"
  ALLOWED_HOSTS: "*"
  DB_ENGINE: postgres
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: store_ai
  POSTGRES_USER: store_ai
  OPENROUTER_MODEL: openrouter/free
  FRONTEND_URL: "https://your-frontend-domain.ru"
  DEFAULT_FROM_EMAIL: "noreply@your-domain.ru"
  EMAIL_BACKEND: "django.core.mail.backends.smtp.EmailBackend"
  EMAIL_HOST: "smtp.yandex.ru"
  EMAIL_PORT: "587"
  EMAIL_USE_TLS: "1"
