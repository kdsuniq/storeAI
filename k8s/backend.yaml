apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: store-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - until pg_isready -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do sleep 2; done
          envFrom:
            - configMapRef:
                name: store-ai-config
            - secretRef:
                name: store-ai-secret
      containers:
        - name: backend
          image: cr.yandex/<REGISTRY_ID>/store-ai-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: store-ai-config
            - secretRef:
                name: store-ai-secret
          volumeMounts:
            - name: media
              mountPath: /app/media
          readinessProbe:
            httpGet:
              path: /api/schema/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/schema/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: backend-media
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: store-ai
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-media
  namespace: store-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
