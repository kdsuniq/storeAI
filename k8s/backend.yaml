apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: store-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: cr.yandex/<REGISTRY_ID>/store-ai-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: store-ai-config
            - secretRef:
                name: store-ai-secret
          readinessProbe:
            httpGet:
              path: /api/schema/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/schema/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: store-ai
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
